name = "chungyak-cmd"
main = "worker.js"
compatibility_date = "2026-07-01"

# 봇 실행 트리거 (UTC) — GitHub schedule 대체. 라이트 크론 문자열은 worker.js LIGHT_CRON과 동기
[triggers]
crons = [
  "0 0 * * *",       # KST 09:00 풀 실행
  "0 9 * * *",       # KST 18:00 풀 실행
  "0 1,3,5,7 * * *", # KST 10:00/12:00/14:00/16:00 무순위 라이트 폴링
]
