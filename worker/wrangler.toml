name = "chungyak-cmd"
main = "worker.js"
compatibility_date = "2026-07-01"

# 봇 실행 트리거 (UTC) — GitHub schedule 대체. 분=13이 라이트 표식 (worker.js scheduled와 동기)
[triggers]
crons = [
  "43 23 * * *",      # KST 08:43 풀 실행
  "43 8 * * *",       # KST 17:43 풀 실행
  "13 1,3,5,7 * * *", # KST 10:13/12:13/14:13/16:13 무순위 라이트 폴링
]
