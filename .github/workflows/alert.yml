name: chungyak-alert

on:
  schedule:
    - cron: '0 0 * * *'    # KST 09:00
    - cron: '0 9 * * *'    # KST 18:00
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write           # seen.json 커밋용

concurrency:
  group: chungyak-alert     # 동시 실행 방지 (seen.json 충돌 예방)

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run alert bot
        env:
          SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python chungyak_alert.py

      - name: Persist seen.json
        run: |
          git config user.name "chungyak-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update seen.json"
            git push
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          IFS=',' read -ra IDS <<< "$TELEGRAM_CHAT_ID"
          for id in "${IDS[@]}"; do
            curl -s --max-time 15 "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${id// /}" \
              -d text="🚨 청약 알림봇 실행 실패 — 로그 확인: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              > /dev/null || true
          done
